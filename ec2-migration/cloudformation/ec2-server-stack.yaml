AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2-based server migration from Render - Cost-optimized with S3 backups'

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
    ConstraintDescription: Must be the name of an existing EC2 KeyPair
  
  DomainName:
    Type: String
    Description: Domain name for the application (optional)
    Default: ""
  
  MongoDBURI:
    Type: String
    Description: MongoDB Atlas connection string
    NoEcho: true
    Default: "mongodb+srv://jonahmulcrone:1RFqimbiYxCpSlkU@hahdcluster.igin9.mongodb.net/survey?retryWrites=true&w=majority&appName=HAHDCluster"
  
  JWTSecret:
    Type: String
    Description: JWT signing secret
    NoEcho: true
    Default: "your-jwt-secret-here"

Resources:
  # Security Group (using default VPC)
  ApplicationSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for HAHD application server
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP access
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS access
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          CidrIp: 0.0.0.0/0
          Description: Node.js application port

  # IAM Role for EC2 instance
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: hahd-ec2-server-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3VideoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::driving-simulator-videos
                  - arn:aws:s3:::driving-simulator-videos/*
                  - !Sub '${BackupBucket}/*'
                  - !GetAtt BackupBucket.Arn
        - PolicyName: MongoDBBackupAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub '${BackupBucket}/mongodb-backups/*'
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource: '*'

  # Instance Profile
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # S3 Bucket for MongoDB and application backups
  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'hahd-server-backups-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldBackups
            Status: Enabled
            ExpirationInDays: 30
            Transitions:
              - TransitionInDays: 7
                StorageClass: STANDARD_IA
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # CloudWatch Log Group for backups
  BackupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/hahd/backups
      RetentionInDays: 14

  # Application Log Group
  ApplicationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/hahd/application
      RetentionInDays: 7

  # Launch Template for EC2 instance
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: hahd-server-template
      LaunchTemplateData:
        ImageId: ami-0c02fb55956c7d316  # Amazon Linux 2023
        InstanceType: t3.micro  # Cost-optimized, upgrade to t3.small if needed
        KeyName: !Ref KeyPairName
        SecurityGroupIds:
          - !Ref ApplicationSecurityGroup
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeType: gp3
              VolumeSize: 20  # Start with 20GB, can expand as needed
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            
            # Install Node.js 18 LTS
            curl -fsSL https://rpm.nodesource.com/setup_18.x | bash -
            yum install -y nodejs git nginx python3 python3-pip
            
            # Install PM2 globally
            npm install -g pm2
            
            # Install CloudWatch agent
            yum install -y amazon-cloudwatch-agent
            
            # Create application directory
            mkdir -p /opt/hahd/{server,frontend,data,logs,ssl,scripts}
            cd /opt/hahd
            
            # Clone repository (replace with your repo URL)
            git clone https://github.com/lennox55555/Human-Alignment-Hazardous-Driving-Detection.git temp-repo
            
            # Move server files
            mv temp-repo/server/* /opt/hahd/server/
            mv temp-repo/frontend/dist/* /opt/hahd/frontend/
            mv temp-repo/ETL /opt/hahd/data/
            rm -rf temp-repo
            
            # Set proper ownership
            chown -R ec2-user:ec2-user /opt/hahd
            
            # Install server dependencies
            cd /opt/hahd/server
            npm install --production
            
            # Create environment file
            cat > /opt/hahd/server/.env << EOL
            MONGODB_URI=${MongoDBURI}
            SECRET=${JWTSecret}
            AWS_REGION=${AWS::Region}
            S3_BUCKET_NAME=driving-simulator-videos
            BACKUP_BUCKET=${BackupBucket}
            PORT=3001
            NODE_ENV=production
            EOL
            
            # Create PM2 ecosystem file
            cat > /opt/hahd/ecosystem.config.js << EOL
            module.exports = {
              apps: [{
                name: 'hahd-server',
                script: 'server.js',
                cwd: '/opt/hahd/server',
                instances: 1,
                autorestart: true,
                watch: false,
                max_memory_restart: '500M',
                env: {
                  NODE_ENV: 'production',
                  PORT: 3001
                },
                error_file: '/opt/hahd/logs/err.log',
                out_file: '/opt/hahd/logs/out.log',
                log_file: '/opt/hahd/logs/combined.log',
                time: true
              }]
            };
            EOL
            
            # Configure Nginx
            cat > /etc/nginx/nginx.conf << EOL
            user nginx;
            worker_processes auto;
            error_log /var/log/nginx/error.log;
            pid /run/nginx.pid;
            
            events {
                worker_connections 1024;
            }
            
            http {
                log_format  main  '\$remote_addr - \$remote_user [\$time_local] "\$request" '
                                  '\$status \$body_bytes_sent "\$http_referer" '
                                  '"\$http_user_agent" "\$http_x_forwarded_for"';
            
                access_log  /var/log/nginx/access.log  main;
            
                sendfile            on;
                tcp_nopush          on;
                tcp_nodelay         on;
                keepalive_timeout   65;
                types_hash_max_size 4096;
                client_max_body_size 100M;
            
                include             /etc/nginx/mime.types;
                default_type        application/octet-stream;
            
                # Upstream for Node.js app
                upstream nodejs_backend {
                    server 127.0.0.1:3001;
                }
            
                # Default server block
                server {
                    listen       80 default_server;
                    listen       [::]:80 default_server;
                    server_name  _;
            
                    # API routes to Node.js backend
                    location /api/ {
                        proxy_pass http://nodejs_backend;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade \$http_upgrade;
                        proxy_set_header Connection 'upgrade';
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto \$scheme;
                        proxy_cache_bypass \$http_upgrade;
                    }
            
                    location /auth/ {
                        proxy_pass http://nodejs_backend;
                        proxy_http_version 1.1;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto \$scheme;
                    }
            
                    location /survey/ {
                        proxy_pass http://nodejs_backend;
                        proxy_http_version 1.1;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto \$scheme;
                    }
            
                    # Health check endpoint
                    location /health {
                        proxy_pass http://nodejs_backend;
                        access_log off;
                    }
            
                    # Default fallback
                    location / {
                        return 200 'HAHD Server is running';
                        add_header Content-Type text/plain;
                    }
                }
            }
            EOL
            
            # Start and enable services
            systemctl enable nginx
            systemctl start nginx
            
            # Start application with PM2 as ec2-user
            sudo -u ec2-user bash -c '
                cd /opt/hahd
                export PATH=$PATH:/usr/bin
                pm2 start ecosystem.config.js
                pm2 save
                pm2 startup
            '
            
            # Install PM2 startup script
            env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u ec2-user --hp /home/ec2-user
            
            # Configure CloudWatch agent
            cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << EOL
            {
              "logs": {
                "logs_collected": {
                  "files": {
                    "collect_list": [
                      {
                        "file_path": "/opt/hahd/logs/combined.log",
                        "log_group_name": "${ApplicationLogGroup}",
                        "log_stream_name": "{instance_id}/application"
                      },
                      {
                        "file_path": "/var/log/nginx/access.log",
                        "log_group_name": "${ApplicationLogGroup}",
                        "log_stream_name": "{instance_id}/nginx-access"
                      },
                      {
                        "file_path": "/var/log/nginx/error.log",
                        "log_group_name": "${ApplicationLogGroup}",
                        "log_stream_name": "{instance_id}/nginx-error"
                      }
                    ]
                  }
                }
              },
              "metrics": {
                "namespace": "HAHD/EC2",
                "metrics_collected": {
                  "cpu": {
                    "measurement": ["cpu_usage_idle", "cpu_usage_iowait", "cpu_usage_user", "cpu_usage_system"],
                    "metrics_collection_interval": 300,
                    "totalcpu": false
                  },
                  "disk": {
                    "measurement": ["used_percent"],
                    "metrics_collection_interval": 300,
                    "resources": ["*"]
                  },
                  "diskio": {
                    "measurement": ["io_time"],
                    "metrics_collection_interval": 300,
                    "resources": ["*"]
                  },
                  "mem": {
                    "measurement": ["mem_used_percent"],
                    "metrics_collection_interval": 300
                  },
                  "netstat": {
                    "measurement": ["tcp_established", "tcp_time_wait"],
                    "metrics_collection_interval": 300
                  }
                }
              }
            }
            EOL
            
            # Start CloudWatch agent
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json

  # EC2 Instance
  ApplicationInstance:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: HAHD-Production-Server
        - Key: Environment
          Value: Production
        - Key: Application
          Value: HumanAlignmentHazardousDriverDetection

  # Elastic IP for consistent public IP
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref ApplicationInstance
      Tags:
        - Key: Name
          Value: HAHD-Server-EIP

  # CloudWatch Alarm for high CPU
  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: HAHD-Server-HighCPU
      AlarmDescription: Alarm when server exceeds 80% CPU
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref ApplicationInstance
      AlarmActions:
        - !Ref SNSTopicAlerts

  # CloudWatch Alarm for instance status
  StatusCheckFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: HAHD-Server-StatusCheckFailed
      AlarmDescription: Alarm when server status check fails
      MetricName: StatusCheckFailed
      Namespace: AWS/EC2
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref ApplicationInstance
      AlarmActions:
        - !Ref SNSTopicAlerts

  # SNS Topic for alerts
  SNSTopicAlerts:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: HAHD-Server-Alerts
      DisplayName: HAHD Server Monitoring Alerts

Outputs:
  PublicIP:
    Description: Public IP address of the server
    Value: !Ref ElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-PublicIP'
  
  PublicDNS:
    Description: Public DNS name of the server
    Value: !GetAtt ApplicationInstance.PublicDnsName
    Export:
      Name: !Sub '${AWS::StackName}-PublicDNS'
  
  BackupBucketName:
    Description: S3 bucket for backups
    Value: !Ref BackupBucket
    Export:
      Name: !Sub '${AWS::StackName}-BackupBucket'
  
  ServerURL:
    Description: Server URL for frontend configuration
    Value: !Sub 'http://${ElasticIP}:3001'
    Export:
      Name: !Sub '${AWS::StackName}-ServerURL'
  
  SSHCommand:
    Description: SSH command to connect to the server
    Value: !Sub 'ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${ElasticIP}'
    Export:
      Name: !Sub '${AWS::StackName}-SSHCommand'