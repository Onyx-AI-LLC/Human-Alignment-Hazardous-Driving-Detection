AWSTemplateFormatVersion: '2010-09-09'
Description: 'MongoDB Survey Results Monitor - Triggers processing every 50 documents'

Parameters:
  MongoDBURI:
    Type: String
    Description: MongoDB connection URI
    Default: "mongodb+srv://jonahmulcrone:1RFqimbiYxCpSlkU@hahdcluster.igin9.mongodb.net/survey?retryWrites=true&w=majority&appName=HAHDCluster"
    NoEcho: true

Resources:
  # DynamoDB table to track document counts
  SurveyTrackingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: survey-results-tracking
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  # IAM Role for Lambda function
  MongoDBMonitorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mongodb-monitor-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt SurveyTrackingTable.Arn
        - PolicyName: EventBridgePublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default'

  # Lambda Layer for PyMongo dependency
  PyMongoLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: pymongo-layer
      Description: PyMongo library for MongoDB connections
      CompatibleRuntimes:
        - python3.9
        - python3.10
        - python3.11
      Content:
        S3Bucket: !Ref LambdaArtifactsBucket
        S3Key: pymongo-layer.zip

  # S3 bucket for Lambda artifacts
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'mongodb-monitor-artifacts-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Lambda function
  MongoDBMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: mongodb-survey-monitor
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt MongoDBMonitorRole.Arn
      Timeout: 300
      MemorySize: 128
      Environment:
        Variables:
          MONGODB_URI: !Ref MongoDBURI
          TRACKING_TABLE: !Ref SurveyTrackingTable
      Layers:
        - !Ref PyMongoLayer
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          from pymongo import MongoClient
          from datetime import datetime
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          # AWS clients
          eventbridge = boto3.client('events')
          dynamodb = boto3.resource('dynamodb')

          def lambda_handler(event, context):
              """
              Lambda function to monitor MongoDB survey.results collection
              Triggers processing when document count increases by 50
              """
              try:
                  # MongoDB connection
                  mongo_uri = os.environ['MONGODB_URI']
                  client = MongoClient(mongo_uri)
                  db = client.survey
                  collection = db.results
                  
                  # Get current document count
                  current_count = collection.count_documents({})
                  logger.info(f"Current document count: {current_count}")
                  
                  # Get last processed count from DynamoDB
                  table = dynamodb.Table(os.environ['TRACKING_TABLE'])
                  
                  try:
                      response = table.get_item(Key={'id': 'survey_results_count'})
                      if 'Item' in response:
                          last_count = response['Item']['count']
                          last_processed = response['Item']['last_processed_count']
                      else:
                          # First run - initialize tracking
                          last_count = current_count
                          last_processed = current_count
                          table.put_item(Item={
                              'id': 'survey_results_count',
                              'count': current_count,
                              'last_processed_count': current_count,
                              'timestamp': datetime.utcnow().isoformat()
                          })
                          logger.info(f"Initialized tracking with count: {current_count}")
                  except Exception as e:
                      logger.error(f"Error accessing DynamoDB: {e}")
                      return {
                          'statusCode': 500,
                          'body': json.dumps({'error': 'Failed to access tracking table'})
                      }
                  
                  # Check if we've crossed a 50-document threshold
                  documents_since_last_processed = current_count - last_processed
                  threshold_crossed = documents_since_last_processed >= 50
                  
                  logger.info(f"Last processed: {last_processed}, Current: {current_count}, Difference: {documents_since_last_processed}")
                  
                  if threshold_crossed:
                      # Calculate how many 50-document batches we have
                      batches_ready = documents_since_last_processed // 50
                      new_processed_count = last_processed + (batches_ready * 50)
                      
                      # Publish custom event to EventBridge
                      event_detail = {
                          'current_count': current_count,
                          'last_processed_count': last_processed,
                          'new_processed_count': new_processed_count,
                          'documents_to_process': batches_ready * 50,
                          'batches_ready': batches_ready,
                          'timestamp': datetime.utcnow().isoformat()
                      }
                      
                      eventbridge.put_events(
                          Entries=[
                              {
                                  'Source': 'custom.mongodb.monitor',
                                  'DetailType': 'Survey Results Threshold Reached',
                                  'Detail': json.dumps(event_detail),
                                  'EventBusName': 'default'
                              }
                          ]
                      )
                      
                      # Update tracking table
                      table.put_item(Item={
                          'id': 'survey_results_count',
                          'count': current_count,
                          'last_processed_count': new_processed_count,
                          'timestamp': datetime.utcnow().isoformat()
                      })
                      
                      logger.info(f"Threshold reached! Published event for {batches_ready} batches ({batches_ready * 50} documents)")
                      
                      return {
                          'statusCode': 200,
                          'body': json.dumps({
                              'threshold_reached': True,
                              'current_count': current_count,
                              'documents_to_process': batches_ready * 50,
                              'batches_ready': batches_ready
                          })
                      }
                  else:
                      # Update current count in tracking table
                      table.put_item(Item={
                          'id': 'survey_results_count',
                          'count': current_count,
                          'last_processed_count': last_processed,
                          'timestamp': datetime.utcnow().isoformat()
                      })
                      
                      logger.info(f"No threshold reached. Need {50 - documents_since_last_processed} more documents.")
                      
                      return {
                          'statusCode': 200,
                          'body': json.dumps({
                              'threshold_reached': False,
                              'current_count': current_count,
                              'documents_until_next_batch': 50 - documents_since_last_processed
                          })
                      }
                      
              except Exception as e:
                  logger.error(f"Error in lambda_handler: {e}")
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }
              finally:
                  if 'client' in locals():
                      client.close()

  # EventBridge rule to trigger Lambda every 5 minutes
  MongoDBMonitorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: mongodb-monitor-schedule
      Description: 'Triggers MongoDB monitor every 5 minutes'
      ScheduleExpression: 'rate(5 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt MongoDBMonitorFunction.Arn
          Id: MongoDBMonitorTarget

  # Permission for EventBridge to invoke Lambda
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref MongoDBMonitorFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MongoDBMonitorScheduleRule.Arn

  # EventBridge rule to catch threshold events (for future processing triggers)
  ProcessingTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: survey-processing-trigger
      Description: 'Triggered when survey results threshold is reached'
      EventPattern:
        source:
          - custom.mongodb.monitor
        detail-type:
          - Survey Results Threshold Reached
      State: ENABLED
      # Targets will be added later when you create processing Lambda

Outputs:
  MonitorFunctionArn:
    Description: 'ARN of the MongoDB monitor Lambda function'
    Value: !GetAtt MongoDBMonitorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MonitorFunction'

  TrackingTableName:
    Description: 'Name of the DynamoDB tracking table'
    Value: !Ref SurveyTrackingTable
    Export:
      Name: !Sub '${AWS::StackName}-TrackingTable'

  ProcessingTriggerRuleArn:
    Description: 'ARN of the EventBridge rule for processing triggers'
    Value: !GetAtt ProcessingTriggerRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ProcessingTrigger'

  ArtifactsBucketName:
    Description: 'S3 bucket for Lambda artifacts'
    Value: !Ref LambdaArtifactsBucket
    Export:
      Name: !Sub '${AWS::StackName}-ArtifactsBucket'